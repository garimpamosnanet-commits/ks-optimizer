<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Optimizer - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        (function() {
            var saved = localStorage.getItem('ks-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--bg-base); }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }
        .login-logo { text-align: center; margin-bottom: 32px; }
        .login-logo img { height: 48px; margin-bottom: 12px; }
        .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--text-primary); margin: 0; }
        .login-logo p { font-size: 13px; color: var(--text-secondary); margin: 4px 0 0; }
        .login-field { margin-bottom: 16px; }
        .login-field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
        .login-field input {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px;
            font-size: 14px; font-family: inherit; background: var(--bg-secondary); color: var(--text-primary);
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .login-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: var(--accent); color: #fff; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-top: 8px;
        }
        .login-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">
            <img src="/ks-logo.png" alt="KS Digital">
            <h1>KS Optimizer</h1>
            <p>Otimizacao automatica Meta Ads</p>
        </div>
        <form id="login-form">
            <div class="login-field">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="seu@email.com" required>
            </div>
            <div class="login-field">
                <label>Senha</label>
                <input type="password" id="login-password" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="login-btn">Entrar</button>
            <p class="login-error" id="login-error"></p>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errEl = document.getElementById('login-error');
            errEl.style.display = 'none';
            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();
                if (data.ok) {
                    localStorage.setItem('ks-user-name', data.name || 'Usuario');
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.error || 'Credenciais invalidas';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Erro de conexao';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
